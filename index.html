<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN MEMBER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url('https://i.pinimg.com/736x/33/42/21/3342213bd4e4e647f4999daf10a2c422.jpg');

background-size:cover;
background-position:center;

}

.login-box{

width:380px;

padding:40px;

background:rgba(0,0,0,0.75);

border:2px solid gold;

border-radius:25px;

backdrop-filter:blur(12px);

box-shadow:
0 0 20px gold,
0 0 50px rgba(255,215,0,0.3);

text-align:center;

}

.login-box h1{

color:gold;

font-size:42px;

margin-bottom:30px;

}

.input-box{

margin-bottom:20px;

}

.input-box input{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:12px;

background:#111;

color:white;

font-size:16px;

border:2px solid gold;

}

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:gold;

color:black;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.error{

margin-top:15px;

color:red;

font-weight:bold;

}

</style>

</head>

<body>

<div class="login-box">

<h1>LOGIN MEMBER</h1>

<div class="input-box">
<input type="text" id="userid" placeholder="ID MEMBER">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="PASSWORD">
</div>

<button class="login-btn" id="loginBtn">
LOGIN
</button>

<p class="error" id="error"></p>

</div>

<script>

document.getElementById("loginBtn").onclick = function(){

location.href = "home.html?v=" + new Date().getTime();

};

</script>

</body>
</html>
